<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Catherine Nuñez Flos</title>
    <link rel="stylesheet" href="../style.css" />
    <link rel="stylesheet" href="./contacto.css" />
  </head>

  <body>
    <header class="mainHeader">
      <div class="headerContainer">
        <div class="headerIcon">
          <img src="../assets/logo.png" alt="icon" />
        </div>

        <h1 class="headerName">Catherine Nuñez Flos</h1>

        <div class="mobileMenuToggle" id="mobileMenuToggle">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>
    </header>

    <div class="mainContainer">
      <nav class="sidebar" id="sidebar">
        <ul class="sidebarList">
          <li class="sidebarItem">
            <a href="/" class="sidebarLink">Bio</a>
          </li>
          <li class="sidebarItem">
            <a href="/mediaciones/" class="sidebarLink">Mediaciones</a>
          </li>
          <li class="sidebarItem">
            <a href="/procesosFormativos/" class="sidebarLink"
              >Procesos Formativos</a
            >
          </li>
          <li class="sidebarItem">
            <a href="/curadurias/" class="sidebarLink">Curadurias</a>
          </li>
          <li class="sidebarItem">
            <a href="/trabajoArtistico/" class="sidebarLink"
              >Trabajo Artístico</a
            >
          </li>
          <li class="sidebarItem">
            <a href="/publicaciones/" class="sidebarLink">Publicaciones</a>
          </li>
          <li class="sidebarItem">
            <a href="#contacto" class="sidebarLink active">Contacto</a>
          </li>
        </ul>
      </nav>

      <main class="mainContent">
        <section class="contactoSection" id="contacto">
          <h2 class="sectionTitle">Contacto</h2>

          <div class="introTextContainer">
            <p class="introParagraph">
              Para consultas, colaboraciones o información, por favor complete
              el siguiente formulario y me pondré en contacto a la brevedad.
            </p>
          </div>

          <form id="contactForm" class="contactForm">
            <div class="formGroup">
              <label for="name">Nombre</label>
              <input type="text" id="name" name="name" />
              <span class="errorMessage" id="nameError"></span>
            </div>

            <div class="formGroup">
              <label for="email">Correo Electrónico</label>
              <input type="email" id="email" name="email" />
              <span class="errorMessage" id="emailError"></span>
            </div>

            <div class="formGroup">
              <label for="message">Mensaje</label>
              <textarea id="message" name="message" rows="5"></textarea>
              <span class="errorMessage" id="messageError"></span>
            </div>

            <div id="formStatus" class="formStatus"></div>

            <button type="submit" class="submitButton">Enviar Mensaje</button>
          </form>
        </section>
      </main>
    </div>

    <script src="../script.js"></script>
    <script src="./contacto.js"></script>
  </body>
</html>
